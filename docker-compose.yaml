services:

  nodeA:
    # build: .
    image: sumanthgma4/hashandra-node:1.0   # Use the already existing image
    container_name: nodeA
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SELF_NAME: nodeA
      NODES: nodeA:http://nodeA:8081,nodeB:http://nodeB:8082,nodeC:http://nodeC:8083,nodeD:http://nodeD:8084
    networks:
      - local_app_network

  nodeB:
    # build: .
    image: sumanthgma4/hashandra-node:1.0
    container_name: nodeB
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SELF_NAME: nodeB
      NODES: nodeA:http://nodeA:8081,nodeB:http://nodeB:8082,nodeC:http://nodeC:8083,nodeD:http://nodeD:8084
    networks:
      - local_app_network

  nodeC:
    # build: .
    image: sumanthgma4/hashandra-node:1.0
    container_name: nodeC
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SELF_NAME: nodeC
      NODES: nodeA:http://nodeA:8081,nodeB:http://nodeB:8082,nodeC:http://nodeC:8083,nodeD:http://nodeD:8084
    networks:
      - local_app_network

  nodeD:
    # build: .
    image: sumanthgma4/hashandra-node:1.0
    container_name: nodeD
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SELF_NAME: nodeD
      NODES: nodeA:http://nodeA:8081,nodeB:http://nodeB:8082,nodeC:http://nodeC:8083,nodeD:http://nodeD:8084
    networks:
      - local_app_network



networks:
  local_app_network: